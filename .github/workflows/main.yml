name: Minimal Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup and Make
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential gcc-aarch64-linux-gnu clang lld llvm xxd python3 zip uuid-dev liblzma-dev
        make dist DIST_NAME=canoe_release_build || true

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: canoe-release-package
        path: release/canoe_release_build.zip
